<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#00855b",
              "on-error": "#ffffff",
              "tertiary-fixed": "#6ffbbe",
              "primary-fixed-dim": "#ffb59e",
              "surface-container": "#eceef0",
              "tertiary-fixed-dim": "#4edea3",
              "secondary-fixed-dim": "#ffb59e",
              "on-surface": "#191c1e",
              "on-tertiary-fixed-variant": "#005236",
              "on-surface-variant": "#5c4037",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#832602",
              "error": "#ba1a1a",
              "surface-container-low": "#f2f4f6",
              "inverse-surface": "#2d3133",
              "on-primary-container": "#fffbff",
              "outline-variant": "#e6beb2",
              "error-container": "#ffdad6",
              "surface-variant": "#e0e3e5",
              "inverse-primary": "#ffb59e",
              "background": "#f8f9fb",
              "surface-container-highest": "#e0e3e5",
              "surface-dim": "#d8dadc",
              "on-secondary": "#ffffff",
              "outline": "#916f65",
              "primary-container": "#d34000",
              "surface-tint": "#ad3300",
              "on-primary-fixed": "#3a0b00",
              "primary": "#a93100",
              "surface": "#f8f9fb",
              "inverse-on-surface": "#eff1f3",
              "on-error-container": "#93000a",
              "secondary": "#a43d19",
              "on-secondary-container": "#6d1d00",
              "surface-bright": "#f8f9fb",
              "on-secondary-fixed": "#3a0b00",
              "tertiary": "#006947",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#f5fff6",
              "on-background": "#191c1e",
              "secondary-fixed": "#ffdbd0",
              "primary-fixed": "#ffdbd0",
              "on-primary-fixed-variant": "#842500",
              "on-primary": "#ffffff",
              "surface-container-high": "#e6e8ea",
              "secondary-container": "#fd7f56",
              "on-tertiary-fixed": "#002113"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            outline: none;
            border: 2px solid rgba(169, 49, 0, 0.2);
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- Top Navigation Bar - Contextually suppressed text links for focus -->
<header class="sticky top-0 w-full flex justify-between items-center px-6 py-4 max-w-7xl mx-auto bg-white/85 backdrop-blur-xl z-50">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</div>
<div class="text-xl font-black text-gray-900 tracking-tighter">
            The Culinary Curator
        </div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 max-w-md mx-auto w-full pb-24">
<!-- Illustration / Brand Element -->
<div class="mb-10 w-24 h-24 bg-primary-fixed rounded-full flex items-center justify-center shadow-[0_12px_32px_rgba(169,49,0,0.1)]">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">lock_person</span>
</div>
<!-- Heading Section -->
<div class="text-center mb-12">
<h1 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight mb-3">
                Verify Your Account
            </h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px] mx-auto">
                Enter 4-digit code sent to <span class="font-bold text-on-surface">+XX 555-0000</span>
</p>
</div>
<!-- OTP Input Grid -->
<div class="grid grid-cols-4 gap-4 w-full mb-12">
<input class="otp-input w-full aspect-square text-center text-3xl font-bold bg-surface-container-low border-none rounded-xl text-primary focus:ring-0 transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-3xl font-bold bg-surface-container-low border-none rounded-xl text-primary focus:ring-0 transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-3xl font-bold bg-surface-container-low border-none rounded-xl text-primary focus:ring-0 transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-full aspect-square text-center text-3xl font-bold bg-surface-container-low border-none rounded-xl text-primary focus:ring-0 transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Resend Section -->
<div class="text-center flex flex-col items-center gap-8 w-full">
<p class="text-on-surface-variant/60 font-label text-xs uppercase tracking-[0.1em]">
                Resend in <span class="text-primary/70 font-bold">0:59</span>
</p>
<button class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold tracking-tight shadow-[0_12px_32px_rgba(169,49,0,0.15)] active:scale-95 transition-transform">
                Verify &amp; Continue
            </button>
<button class="text-on-surface-variant text-sm font-medium hover:text-primary transition-colors flex items-center gap-2">
                I didn't receive a code
                <span class="material-symbols-outlined text-base">help_outline</span>
</button>
</div>
</main>
<!-- Background Decorative Element -->
<div class="fixed top-0 right-0 -z-10 w-full h-full overflow-hidden opacity-10 pointer-events-none">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-fixed rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-24 w-64 h-64 bg-secondary-fixed rounded-full blur-3xl"></div>
</div>
</body></html>
