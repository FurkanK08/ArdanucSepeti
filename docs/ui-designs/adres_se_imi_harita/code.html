<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pin-bounce {
            transform: translateY(-50%);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #a93100 0%, #d34000 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Map Canvas (Full Screen) -->
<main class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Detailed urban city map top view with streets, parks and buildings in a clean aesthetic minimalist cartography style" data-location="Istanbul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCC4vneJUVlOcz537TjxuLmS6w9OHeqieV0f7thmqMnPMwfHiydmS81UNk1qgMBm3kHPNVI8GqqtZ9igqdOMwUHZdB4SgPVMTLPrkS6c8i0I7VuIgsIgXNTblcKf3-pa7lICLLZxONp5lyGS13bZa9jwZM41ArF9dtIeezpWF-PqVbtnqAZ9L4C6luTH0fmowMhZfSp48T7ZgGJsw-rTa0coS_idSS3svvPHKTl2ikfPZ_jtDCYN7bzo1WijTtP4zidpDSqL0y5uNE"/>
<!-- Center Floating Pin -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative flex flex-col items-center pin-bounce">
<!-- Pin Body -->
<div class="w-12 h-12 bg-primary rounded-full rounded-bl-none rotate-45 flex items-center justify-center shadow-[0_12px_32px_rgba(169,49,0,0.3)] border-2 border-white/20">
<div class="w-4 h-4 bg-white rounded-full -rotate-45"></div>
</div>
<!-- Drop Shadow Dot -->
<div class="w-2 h-1 bg-on-surface/20 rounded-full blur-[1px] mt-8"></div>
</div>
</div>
<!-- Map UI Controls -->
<div class="absolute top-20 right-6 flex flex-col gap-4">
<button class="w-12 h-12 glass-nav rounded-lg flex items-center justify-center text-on-surface shadow-[0_8px_24px_rgba(0,0,0,0.04)] active:scale-95 transition-transform">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="w-12 h-12 glass-nav rounded-lg flex items-center justify-center text-on-surface shadow-[0_8px_24px_rgba(0,0,0,0.04)] active:scale-95 transition-transform">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</main>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 glass-nav shadow-[0_12px_32px_rgba(169,49,0,0.06)]">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-black text-orange-600 tracking-tight font-headline">Citrus Market</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Professional portrait of a user for profile avatar, clean studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALt7bRjtWA1d7Kvw56vrgeATnJh90pGLosbLOVsHt550ht8OuX6vdWUYrW5aXrQGzFfFv7pUHlQDy1LTdtvhK-w_94o5wF5nxaRtesajRTm2dZekeIOXxEVcaoK8yVA2s6v4Ek6jqiTcnQFQXNR2ii05SnVWhKJlNSA8bD9j1vjOZtlVt8jPnNjim4GgHfcdN0Cl-HkywLip_vFGiTHVmc_eInQO033Ln8xp6PlBgYMTIRE1_pVnKeY0q2ZBoSJSURH-SDe8EVvxI"/>
</div>
</div>
</header>
<!-- Bottom Sheet Address Card -->
<section class="fixed bottom-0 left-0 w-full z-50">
<!-- Visual Handle -->
<div class="flex justify-center mb-2">
<div class="w-12 h-1.5 bg-white/40 rounded-full"></div>
</div>
<div class="bg-surface-container-lowest rounded-t-[2rem] px-6 pt-8 pb-10 shadow-[0_-12px_48px_rgba(0,0,0,0.12)] max-w-2xl mx-auto">
<!-- Location Indicator -->
<div class="flex items-start gap-4 mb-8">
<div class="w-10 h-10 rounded-xl bg-orange-50 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<h2 class="text-on-surface font-bold text-lg leading-tight">Teslimat Adresi</h2>
<p class="text-on-surface-variant text-sm mt-1">Gülbahar, Profilo AVM, 34394 Şişli/İstanbul</p>
</div>
</div>
<div class="space-y-6">
<!-- Address Title Input -->
<div class="space-y-2">
<label class="text-[11px] font-medium uppercase tracking-wider text-on-surface-variant px-1">Adres Başlığı</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" placeholder="Örn: Ev, İş, Sahil..." type="text"/>
</div>
</div>
<!-- Building Info Textarea -->
<div class="space-y-2">
<label class="text-[11px] font-medium uppercase tracking-wider text-on-surface-variant px-1">Bina No / Kapı No</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all resize-none" placeholder="Daire, Kat, Zil Notu vb." rows="2"></textarea>
</div>
<!-- Action Button -->
<button class="w-full primary-gradient text-white font-bold py-5 rounded-lg shadow-[0_12px_32px_rgba(169,49,0,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Konumu Kaydet</span>
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</button>
</div>
</div>
</section>
<!-- Content Safe Area (Optional for Notch Spacing) -->
<div class="h-6 w-full fixed bottom-0 bg-surface-container-lowest z-[60]"></div>
</body></html>
