</div>
</div>

</div>
</div>

<div class="inline-flex items-center bg-surface-container-low rounded-full p-1 gap-4 border border-outline-variant/10">

</div>

</div>
<div class="text-left">
<span class="block font-headline font-bold text-base leading-none">Card at Door</span>
<span class="text-xs text-gray-500 mt-1">POS machine delivery</span>
</div>
</div>
<span class="material-symbols-outlined text-gray-300">radio_button_unchecked</span>
