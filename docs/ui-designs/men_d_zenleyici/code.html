<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f5f6f7",
              "secondary-dim": "#902c2b",
              "on-surface-variant": "#595c5d",
              "on-background": "#2c2f30",
              "secondary-fixed-dim": "#ffafaa",
              "tertiary": "#843d98",
              "on-secondary": "#ffefee",
              "error-container": "#fb5151",
              "surface-dim": "#d1d5d7",
              "secondary-fixed": "#ffc3bf",
              "tertiary-fixed-dim": "#dd8eef",
              "primary-fixed": "#ff784c",
              "secondary": "#a03836",
              "on-primary-container": "#460f00",
              "surface-container": "#e6e8ea",
              "secondary-container": "#ffc3bf",
              "on-primary-fixed-variant": "#561500",
              "outline-variant": "#abadae",
              "background": "#f5f6f7",
              "on-secondary-fixed": "#6a0f13",
              "primary": "#a83100",
              "on-tertiary": "#ffeefd",
              "on-error": "#ffefee",
              "surface-container-high": "#e0e3e4",
              "primary-fixed-dim": "#ff5d23",
              "on-secondary-container": "#852424",
              "surface-container-highest": "#dadddf",
              "inverse-primary": "#ff5717",
              "inverse-on-surface": "#9b9d9e",
              "outline": "#757778",
              "surface-container-low": "#eff1f2",
              "on-primary": "#ffefeb",
              "on-primary-fixed": "#000000",
              "surface-variant": "#dadddf",
              "on-tertiary-fixed": "#3b004c",
              "on-error-container": "#570008",
              "error": "#b31b25",
              "error-dim": "#9f0519",
              "surface-tint": "#a83100",
              "inverse-surface": "#0c0f10",
              "on-secondary-fixed-variant": "#912d2c",
              "on-tertiary-fixed-variant": "#651d79",
              "primary-dim": "#942a00",
              "on-surface": "#2c2f30",
              "on-tertiary-container": "#5b1170",
              "tertiary-container": "#eb9bfe",
              "surface": "#f5f6f7",
              "primary-container": "#ff784c",
              "tertiary-dim": "#77308b",
              "tertiary-fixed": "#eb9bfe",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-label-container:focus-within label,
        .floating-label-container input:not(:placeholder-shown) + label {
            transform: translateY(-1.25rem) scale(0.85);
            color: #a83100;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl shadow-sm shadow-orange-900/5 flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-zinc-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-zinc-500">arrow_back</span>
</button>
<h1 class="font-headline text-xl font-semibold tracking-tight text-on-surface">Menü Düzenleyici</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="professional chef portrait in clean white uniform with soft studio lighting and warm background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC995RMxzbfPGwbDr0EIaePCeAYVULcOdFkWjNuMedTS-KV-iVB0dK8c3Pf63IDKhosN-6ZTwyMUJqYVYK5qXAdCbQQhjPqOQr15k6zXedV9eGuSxKAFUxN4jdKwFIIHOzHmqCmSXzu16r4ksPB5qdIjHiLyWrqD2JQk_xdWb3P6I6cGt0uRSVig8py--NkTZXoCp-8nbbzEEHWFaGUzOF5l3qqy3EPBFayWoMt2wqgXZgeLG-KMtG_h5FGLbBG8hydqCwTGUXW7GSg"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<div class="space-y-8">
<div class="relative group">
<div class="aspect-square w-full rounded-[32px] bg-surface-container-low border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-surface-container-high transition-all overflow-hidden">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<div class="text-center">
<p class="font-headline font-semibold text-on-surface">Görsel Yükle</p>
<p class="text-sm text-on-surface-variant mt-1">PNG veya JPG (Maks. 5MB)</p>
</div>
</div>
</div>
<form class="space-y-6">
<div class="relative floating-label-container">
<input class="block w-full px-5 py-4 text-on-surface bg-surface-container-lowest rounded-xl border-none ring-1 ring-inset ring-outline-variant/20 focus:ring-2 focus:ring-inset focus:ring-primary transition-all peer outline-none" id="product_name" name="product_name" placeholder=" " type="text"/>
<label class="absolute left-5 top-4 text-on-surface-variant transition-all duration-200 pointer-events-none origin-left bg-surface-container-lowest px-1" for="product_name">
                        Ürün Adı
                    </label>
</div>
<div class="relative floating-label-container">
<textarea class="block w-full px-5 py-4 text-on-surface bg-surface-container-lowest rounded-xl border-none ring-1 ring-inset ring-outline-variant/20 focus:ring-2 focus:ring-inset focus:ring-primary transition-all peer outline-none resize-none" id="description" name="description" placeholder=" " rows="3"></textarea>
<label class="absolute left-5 top-4 text-on-surface-variant transition-all duration-200 pointer-events-none origin-left bg-surface-container-lowest px-1" for="description">
                        Açıklama
                    </label>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative floating-label-container">
<input class="block w-full px-5 py-4 text-on-surface bg-surface-container-lowest rounded-xl border-none ring-1 ring-inset ring-outline-variant/20 focus:ring-2 focus:ring-inset focus:ring-primary transition-all peer outline-none" id="price" name="price" placeholder=" " type="number"/>
<label class="absolute left-5 top-4 text-on-surface-variant transition-all duration-200 pointer-events-none origin-left bg-surface-container-lowest px-1" for="price">
                            Fiyat (TL)
                        </label>
</div>
<div class="relative">
<select class="block w-full px-5 py-4 text-on-surface bg-surface-container-lowest rounded-xl border-none ring-1 ring-inset ring-outline-variant/20 focus:ring-2 focus:ring-inset focus:ring-primary transition-all outline-none appearance-none" id="category" name="category">
<option disabled="" selected="" value="">Kategori Seçin</option>
<option value="ana-yemek">Ana Yemek</option>
<option value="ara-sicak">Ara Sıcak</option>
<option value="tatli">Tatlı</option>
<option value="icecek">İçecek</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="pt-4 flex items-center justify-between p-4 bg-orange-50 rounded-2xl border border-orange-100/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-600" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-sm font-medium text-orange-800">Ürün anında yayına alınacaktır.</p>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-bold text-orange-600 uppercase tracking-widest">Canlı</span>
<div class="w-2 h-2 rounded-full bg-orange-600 animate-pulse"></div>
</div>
</div>
</form>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl z-50">
<button class="w-full bg-gradient-to-br from-[#a83100] to-[#ff784c] text-white font-headline font-bold py-5 rounded-2xl shadow-lg shadow-orange-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Ürünü Kaydet
        </button>
</div>
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl z-[60] hidden md:flex">
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-orange-500 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">home_app_logo</span>
<span class="text-[11px] font-inter font-medium">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-orange-50 dark:bg-orange-950/30 text-orange-600 dark:text-orange-400 rounded-2xl px-5 py-2 hover:text-orange-500 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="text-[11px] font-inter font-medium">Orders</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-orange-500 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">person</span>
<span class="text-[11px] font-inter font-medium">Profile</span>
</div>
</nav>
</body></html>
